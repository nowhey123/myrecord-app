<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6b6f8d">
<title>我的记录</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#f3f4f8; --card:#fff; --text:#23262f; --muted:#9298ab;
    --line:#e9ebf2; --primary:#6c63ff; --primary-soft:#eeedff;
    --shadow:0 2px 14px rgba(40,45,90,.07); --radius:16px;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  header{padding:calc(var(--safe-top) + 14px) 16px 12px;background:var(--card);border-bottom:1px solid var(--line)}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .title{font-size:18px;font-weight:700}
  .icon-btn{width:38px;height:38px;border:none;background:var(--primary-soft);color:var(--primary);
    border-radius:12px;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .icon-btn:active{transform:scale(.94)}
  .segment{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-top:12px}
  .segment button{flex:1;border:none;background:transparent;padding:8px;border-radius:9px;
    font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
  .segment button.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
  main{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}

  /* 月历 */
  .month-wrap{padding:10px 12px 30px}
  .mnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
  .mnav button{border:none;background:var(--primary-soft);color:var(--primary);width:34px;height:34px;
    border-radius:10px;font-size:18px;cursor:pointer}
  .mnav .ml{font-size:15px;font-weight:700;min-width:120px;text-align:center}
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .mhead{text-align:center;font-size:12px;color:var(--muted);font-weight:600;padding:3px 0}
  .mcell{background:var(--card);border-radius:12px;min-height:62px;padding:5px;position:relative;cursor:pointer;
    display:flex;flex-direction:column;align-items:center}
  .mcell.dim{background:transparent}
  .mcell .mn{font-size:13px;font-weight:600;align-self:flex-end}
  .mcell.today{border:2px solid var(--primary)}
  .mcell.today .mn{color:var(--primary)}
  .mcell .cnt{margin-top:auto;margin-bottom:3px;background:var(--primary);color:#fff;font-size:11px;
    font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;padding:0 5px}
  .mcell .dots{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;justify-content:center}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--primary)}

  /* 时间线 */
  .tl-wrap{padding:12px 14px 30px}
  .tl-date{font-size:13px;color:var(--muted);font-weight:700;margin:14px 4px 8px}
  .entry{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
  .entry:active{transform:scale(.99)}
  .entry .etime{font-size:12px;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
  .entry .erating{color:#ffb020;letter-spacing:1px}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--bg);border-radius:8px;padding:4px 9px;font-size:13px}
  .tag b{color:var(--muted);font-weight:600;font-size:11px;margin-right:4px}
  .enote{margin-top:8px;font-size:13px;color:#555;background:var(--bg);border-radius:8px;padding:8px 10px;white-space:pre-wrap}

  /* 统计 */
  .stat-wrap{padding:14px 14px 30px}
  .stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .scard{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .scard .num{font-size:26px;font-weight:800;color:var(--primary)}
  .scard .lab{font-size:12px;color:var(--muted);margin-top:3px}
  .sblock{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
  .sblock h4{margin:0 0 12px;font-size:14px}
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13px}
  .bar-row .bl{width:72px;flex-shrink:0;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-row .bt{flex:1;background:var(--bg);border-radius:6px;height:14px;overflow:hidden}
  .bar-row .bf{height:100%;background:var(--primary);border-radius:6px}
  .bar-row .bv{width:30px;text-align:right;color:var(--muted);font-size:12px}

  .fab{position:fixed;right:18px;bottom:calc(var(--safe-bottom) + 18px);width:56px;height:56px;border-radius:18px;
    border:none;background:var(--primary);color:#fff;font-size:28px;box-shadow:0 6px 18px rgba(108,99,255,.4);cursor:pointer;z-index:20}
  .fab:active{transform:scale(.93)}

  .sheet-mask{position:fixed;inset:0;background:rgba(20,22,40,.42);z-index:30;display:none;align-items:flex-end;justify-content:center}
  .sheet-mask.show{display:flex}
  .sheet{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;
    padding:18px 18px calc(var(--safe-bottom) + 18px);max-height:92vh;overflow:auto;animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
  .sheet h3{margin:2px 0 16px;font-size:17px;display:flex;justify-content:space-between;align-items:center}
  .field{margin-bottom:16px}
  .field>label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);
    border-radius:11px;font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
  .field textarea{min-height:70px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 13px;border-radius:20px;background:var(--bg);font-size:14px;cursor:pointer;border:1.5px solid transparent}
  .chip.sel{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);font-weight:600}
  .stars{display:flex;gap:6px;font-size:30px;color:#dcdef0}
  .stars .st{cursor:pointer}.stars .st.on{color:#ffb020}
  .btns{display:flex;gap:10px;margin-top:6px}
  .btn{flex:1;padding:13px;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-ghost{background:var(--bg);color:var(--text)}
  .btn-danger{background:#ffe9e9;color:#e0463c}
  .empty{text-align:center;color:var(--muted);padding:46px 20px;font-size:14px}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(20,22,40,.92);color:#fff;
    padding:10px 18px;border-radius:20px;font-size:14px;z-index:50;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  /* 字段管理 */
  .fld-item{display:flex;align-items:center;gap:8px;padding:11px;background:var(--bg);border-radius:12px;margin-bottom:8px}
  .fld-item .fn{flex:1}
  .fld-item .fn .nm{font-weight:600;font-size:15px}
  .fld-item .fn .tp{font-size:12px;color:var(--muted);margin-top:2px}
  .mini{width:30px;height:30px;border:none;border-radius:8px;background:var(--card);color:#666;font-size:14px;cursor:pointer}
  .opt-row{display:flex;gap:8px;margin-bottom:8px}
  .opt-row input{flex:1}
  .opt-row button{width:42px;border:none;border-radius:10px;background:#ffe9e9;color:#e0463c;font-size:18px;cursor:pointer}
  .addopt{background:var(--primary-soft);color:var(--primary);border:none;border-radius:10px;padding:9px;width:100%;font-weight:600;cursor:pointer;font-size:14px}
  .settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
  .settings-item .lab{font-size:15px}.settings-item .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .switch{display:flex;gap:8px}
  .cpick{display:flex;gap:10px;flex-wrap:wrap}
  .cpick .cs{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}
  .cpick .cs.sel{border-color:var(--text)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="top-row">
      <div class="title" id="appTitle">我的记录</div>
      <button class="icon-btn" id="btnSettings">⚙</button>
    </div>
    <div class="segment">
      <button id="tabCal" class="active">日历</button>
      <button id="tabList">时间线</button>
      <button id="tabStat">统计</button>
    </div>
  </header>
  <main id="main"></main>
</div>
<button class="fab" id="fab">＋</button>

<!-- 条目编辑 -->
<div class="sheet-mask" id="entryMask">
  <div class="sheet">
    <h3><span id="entryTitle">添加记录</span></h3>
    <div class="row2">
      <div class="field"><label>日期</label><input id="eDate" type="date"></div>
      <div class="field"><label>时间</label><input id="eTime" type="time"></div>
    </div>
    <div class="field"><label>圆点颜色（日历上显示）</label><div class="cpick" id="colorPick"></div></div>
    <div id="dynForm"></div>
    <div class="btns">
      <button class="btn btn-danger" id="eDelete" style="display:none">删除</button>
      <button class="btn btn-ghost" id="eCancel">取消</button>
      <button class="btn btn-primary" id="eSave">保存</button>
    </div>
  </div>
</div>

<!-- 某天 -->
<div class="sheet-mask" id="dayMask">
  <div class="sheet">
    <h3><span id="dayTitle">记录</span></h3>
    <div id="dayList"></div>
    <div class="btns">
      <button class="btn btn-ghost" id="dayClose">关闭</button>
      <button class="btn btn-primary" id="dayAdd">＋ 添加</button>
    </div>
  </div>
</div>

<!-- 设置 -->
<div class="sheet-mask" id="setMask">
  <div class="sheet">
    <h3>设置</h3>
    <div class="field"><label>App 名称</label><input id="sName"></div>
    <div class="settings-item" style="border-top:1px solid var(--line)">
      <div><div class="lab">字段管理</div><div class="sub">增删改记录字段、调整顺序</div></div>
      <button class="icon-btn" id="openFields">▸</button>
    </div>
    <div class="settings-item">
      <div><div class="lab">统计定制</div><div class="sub">自定义统计项（如：飞机次数、射次数）</div></div>
      <button class="icon-btn" id="openStats">▸</button>
    </div>
    <div class="settings-item">
      <div><div class="lab">数据备份</div><div class="sub">导出 / 导入全部数据</div></div>
      <div class="switch"><button class="icon-btn" id="btnExport">⤓</button><button class="icon-btn" id="btnImport">⤒</button></div>
    </div>
    <input type="file" id="fileImport" accept="application/json" style="display:none">
    <div class="btns" style="margin-top:16px">
      <button class="btn btn-danger" id="btnClear">清空记录</button>
      <button class="btn btn-primary" id="setClose">完成</button>
    </div>
  </div>
</div>

<!-- 字段管理 -->
<div class="sheet-mask" id="fieldsMask">
  <div class="sheet">
    <h3><span>字段管理</span></h3>
    <div id="fieldList"></div>
    <button class="addopt" id="addField" style="margin:6px 0 14px">＋ 添加字段</button>
    <div class="btns"><button class="btn btn-primary" id="fieldsClose">完成</button></div>
  </div>
</div>

<!-- 单字段编辑 -->
<div class="sheet-mask" id="fldEditMask">
  <div class="sheet">
    <h3><span id="fldEditTitle">编辑字段</span></h3>
    <div class="field"><label>字段名称</label><input id="flName" placeholder="如：地点"></div>
    <div class="field"><label>类型</label>
      <select id="flType">
        <option value="single">单选</option>
        <option value="multi">多选</option>
        <option value="toggle">开关（是/否）</option>
        <option value="rating">星级评分</option>
        <option value="number">数字</option>
        <option value="text">文字</option>
      </select>
    </div>
    <div class="field" id="optWrap"><label>选项</label><div id="optList"></div>
      <button class="addopt" id="addOpt">＋ 添加选项</button></div>
    <div class="btns">
      <button class="btn btn-danger" id="flDelete" style="display:none">删除字段</button>
      <button class="btn btn-ghost" id="flCancel">取消</button>
      <button class="btn btn-primary" id="flSave">保存</button>
    </div>
  </div>
</div>

<!-- 统计定制 -->
<div class="sheet-mask" id="statsMask">
  <div class="sheet">
    <h3><span>统计定制</span></h3>
    <div id="statList"></div>
    <button class="addopt" id="addStat" style="margin:6px 0 14px">＋ 添加统计项</button>
    <div class="btns"><button class="btn btn-primary" id="statsClose">完成</button></div>
  </div>
</div>

<!-- 统计项编辑 -->
<div class="sheet-mask" id="statEditMask">
  <div class="sheet">
    <h3><span id="statEditTitle">添加统计项</span></h3>
    <div class="field"><label>名称</label><input id="stName" placeholder="如：飞机次数"></div>
    <div class="field"><label>形式</label><select id="stForm"><option value="card">小框（当月数字）</option><option value="trend">大框（逐月趋势）</option></select></div>
    <div class="field"><label>指标</label><select id="stMetric"><option value="count">记录数</option><option value="avg">平均值（评分/数字）</option><option value="value">按选项计数</option></select></div>
    <div class="field" id="stAvgRow"><label>取平均的字段</label><select id="stAvg"></select></div>
    <div class="field" id="stFieldRow"><label>统计字段</label><select id="stField"></select></div>
    <div class="field" id="stValueRow"><label>当值为</label><select id="stValue"></select></div>
    <div class="field" id="stMonthsRow"><label>月数（趋势）</label><select id="stMonths"><option value="3">近 3 个月</option><option value="6">近 6 个月</option><option value="12">近 12 个月</option></select></div>
    <div class="btns">
      <button class="btn btn-danger" id="stDelete" style="display:none">删除</button>
      <button class="btn btn-ghost" id="stCancel">取消</button>
      <button class="btn btn-primary" id="stSave">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE='log_v1';
const TYPE_LABEL={single:'单选',multi:'多选',toggle:'开关',rating:'评分',number:'数字',text:'文字'};
function uid(p){return (p||'x')+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function defaultState(){
  return {
    settings:{name:'我的记录'},
    fields:[
      {id:'f_way',name:'方式',type:'single',options:['10','飞机','口']},
      {id:'f_pos',name:'姿势',type:'multi',options:['面对面','站立','后入','骑乘','其他']},
      {id:'f_loc',name:'地点',type:'single',options:['卧室','客厅','酒店','其他']},
      {id:'f_who',name:'人物',type:'single',options:['A','B','C','D']},
      {id:'f_res',name:'结果',type:'single',options:['1射','0尿','0射','1尿','其他']},
      {id:'f_rate',name:'评分',type:'rating',options:[]},
      {id:'f_dur',name:'时长(分钟)',type:'single',options:['10min以内','10-20min','20-30min','30min以上']},
      {id:'f_note',name:'备注',type:'text',options:[]}
    ],
    entries:[],
    statWidgets:[
      {id:'w1',form:'card',name:'本月记录数',metric:'count'},
      {id:'w2',form:'card',name:'平均评分',metric:'avg',fieldId:'f_rate'},
      {id:'w3',form:'trend',name:'记录数',metric:'count',months:6}
    ]
  };
}
let state=load();
if(!state.statWidgets)state.statWidgets=[];
function load(){try{const s=JSON.parse(localStorage.getItem(STORE));if(s&&s.fields&&s.entries)return s;}catch(e){}return defaultState();}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}
function pad(n){return String(n).padStart(2,'0');}
function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

let viewMode='cal', monthCursor=new Date();
const main=document.getElementById('main');
document.getElementById('appTitle').textContent=state.settings.name||'我的记录';

/* ---------- 渲染入口 ---------- */
function render(){
  document.getElementById('tabCal').classList.toggle('active',viewMode==='cal');
  document.getElementById('tabList').classList.toggle('active',viewMode==='list');
  document.getElementById('tabStat').classList.toggle('active',viewMode==='stat');
  if(viewMode==='cal')renderCal();
  else if(viewMode==='list')renderList();
  else renderStat();
}
function entriesOn(ds){return state.entries.filter(e=>e.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));}

const DOT_COLORS=['#6c63ff','#28c397','#ffb020','#ff5d5d','#3a9bff','#ff7ab8','#9298ab'];
/* 日历圆点颜色：每条记录自行选择 */
function entryColor(e){return e.color||'#6c63ff';}

/* ---------- 月历 ---------- */
function renderCal(){
  const y=monthCursor.getFullYear(),m=monthCursor.getMonth();
  const first=new Date(y,m,1), startOff=(first.getDay()+6)%7, dim=new Date(y,m+1,0).getDate();
  const todayStr=fmtDate(new Date());
  let h='<div class="month-wrap"><div class="mnav"><button id="pm">‹</button>'+
    '<div class="ml">'+y+'年 '+(m+1)+'月</div><button id="nm">›</button></div>'+
    '<div class="month-grid">';
  ['一','二','三','四','五','六','日'].forEach(d=>h+='<div class="mhead">'+d+'</div>');
  for(let i=0;i<startOff;i++)h+='<div class="mcell dim"></div>';
  for(let d=1;d<=dim;d++){
    const ds=y+'-'+pad(m+1)+'-'+pad(d);const es=entriesOn(ds);
    h+='<div class="mcell'+(ds===todayStr?' today':'')+'" data-date="'+ds+'"><div class="mn">'+d+'</div>';
    if(es.length){h+='<div class="dots" style="margin-top:auto;margin-bottom:4px">';
      es.slice(0,6).forEach(e=>h+='<span class="dot" style="background:'+entryColor(e)+'"></span>');
      if(es.length>6)h+='<span style="font-size:9px;color:var(--muted)">+'+(es.length-6)+'</span>';
      h+='</div>';}
    h+='</div>';
  }
  h+='</div></div>';
  main.innerHTML=h;
  document.getElementById('pm').onclick=()=>{monthCursor=new Date(y,m-1,1);render();};
  document.getElementById('nm').onclick=()=>{monthCursor=new Date(y,m+1,1);render();};
  main.querySelectorAll('.mcell[data-date]').forEach(el=>el.onclick=()=>openDay(el.dataset.date));
}

/* ---------- 时间线 ---------- */
function renderList(){
  const all=[...state.entries].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  if(!all.length){main.innerHTML='<div class="empty">还没有记录<br>点右下角 ＋ 添加第一条</div>';return;}
  let h='<div class="tl-wrap">',curDate='';
  all.forEach(e=>{
    if(e.date!==curDate){curDate=e.date;h+='<div class="tl-date">'+fmtNice(e.date)+'</div>';}
    h+=entryCard(e);
  });
  h+='</div>';main.innerHTML=h;
  main.querySelectorAll('.entry').forEach(el=>el.onclick=()=>openEntry(el.dataset.id));
}
function fmtNice(ds){const[y,m,d]=ds.split('-').map(Number);const wk=['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];
  return y+'年'+m+'月'+d+'日 周'+wk;}
function entryCard(e){
  const rate=state.fields.find(f=>f.type==='rating');
  let rstr='';
  if(rate&&e.values[rate.id]){rstr='<span class="erating">'+'★'.repeat(e.values[rate.id])+'</span>';}
  let tags='',note='';
  state.fields.forEach(f=>{
    const v=e.values[f.id];if(v==null||v===''||(Array.isArray(v)&&!v.length))return;
    if(f.type==='rating')return;
    if(f.type==='text'){note='<div class="enote">'+esc(v)+'</div>';return;}
    let disp=f.type==='toggle'?(v?'是':'否'):(Array.isArray(v)?v.join('、'):v);
    if(f.type==='number')disp=disp+'';
    tags+='<span class="tag"><b>'+esc(f.name)+'</b>'+esc(disp)+'</span>';
  });
  return '<div class="entry" data-id="'+e.id+'"><div class="etime"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+entryColor(e)+';margin-right:6px;vertical-align:middle"></span>'+(e.time||'')+'</span>'+rstr+'</div>'+
    '<div class="tags">'+tags+'</div>'+note+'</div>';
}

/* ---------- 统计 ---------- */
let statMonth=new Date();
function monthKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1);}
function monthEntries(mk){return state.entries.filter(e=>e.date.startsWith(mk));}
function metricVal(w,list){
  if(w.metric==='count')return list.length;
  if(w.metric==='avg'){const rs=list.map(e=>e.values[w.fieldId]).filter(v=>typeof v==='number');
    if(!rs.length)return 0;return +(rs.reduce((a,b)=>a+b,0)/rs.length).toFixed(1);}
  let n=0;list.forEach(e=>{const v=e.values[w.fieldId];if(v==null)return;
    if(Array.isArray(v)){if(v.includes(w.value))n++;}
    else if(w.value==='__true__'){if(v===true)n++;}
    else if(w.value==='__false__'){if(v===false)n++;}
    else if(String(v)===w.value)n++;});
  return n;
}
function metricMax(w){return w.metric==='avg'?5:null;}
function scard(n,l){return '<div class="scard"><div class="num">'+n+'</div><div class="lab">'+l+'</div></div>';}
function trendBlock(title,data,fixedMax){
  const max=fixedMax||Math.max(1,...data.map(d=>d.val));
  let h='<div class="sblock"><h4>'+esc(title)+'</h4>';
  data.forEach(d=>{const w=Math.round(d.val/(max||1)*100);
    h+='<div class="bar-row"><div class="bl">'+d.label+'</div><div class="bt"><div class="bf" style="width:'+w+'%"></div></div><div class="bv">'+d.val+'</div></div>';});
  h+='</div>';return h;
}
function renderStat(){
  const list=monthEntries(monthKey(statMonth));
  let h='<div class="stat-wrap">';
  h+='<div class="mnav"><button id="spm">‹</button><div class="ml">'+statMonth.getFullYear()+'年 '+(statMonth.getMonth()+1)+'月</div><button id="snm">›</button></div>';
  const cards=state.statWidgets.filter(w=>w.form==='card');
  const trends=state.statWidgets.filter(w=>w.form==='trend');
  if(cards.length){h+='<div class="stat-cards">';cards.forEach(w=>{h+=scard(metricVal(w,list),esc(w.name));});h+='</div>';}
  trends.forEach(w=>{const n=w.months||6;const arr=[];
    for(let i=n-1;i>=0;i--){const d=new Date(statMonth.getFullYear(),statMonth.getMonth()-i,1);
      arr.push({label:(d.getMonth()+1)+'月',val:metricVal(w,monthEntries(monthKey(d)))});}
    h+=trendBlock(w.name+'（近'+n+'月）',arr,metricMax(w));});
  if(!state.statWidgets.length)h+='<div class="empty">还没有统计项<br>点 ⚙ 设置 → 统计定制 添加</div>';
  h+='</div>';main.innerHTML=h;
  document.getElementById('spm').onclick=()=>{statMonth=new Date(statMonth.getFullYear(),statMonth.getMonth()-1,1);renderStat();};
  document.getElementById('snm').onclick=()=>{statMonth=new Date(statMonth.getFullYear(),statMonth.getMonth()+1,1);renderStat();};
}

/* ---------- 条目编辑 ---------- */
let editingEntry=null, formVals={}, formColor='#6c63ff';
function buildColorPick(){
  const box=document.getElementById('colorPick');box.innerHTML='';
  DOT_COLORS.forEach(c=>{
    const el=document.createElement('div');el.className='cs'+(c===formColor?' sel':'');
    el.style.background=c;el.onclick=()=>{formColor=c;buildColorPick();};
    box.appendChild(el);
  });
}
function buildForm(){
  const box=document.getElementById('dynForm');box.innerHTML='';
  state.fields.forEach(f=>{
    const wrap=document.createElement('div');wrap.className='field';
    wrap.innerHTML='<label>'+esc(f.name)+'</label>';
    const cur=formVals[f.id];
    if(f.type==='single'||f.type==='multi'){
      const chips=document.createElement('div');chips.className='chips';
      f.options.forEach(opt=>{
        const c=document.createElement('div');c.className='chip';c.textContent=opt;
        const on=f.type==='multi'?(Array.isArray(cur)&&cur.includes(opt)):(cur===opt);
        if(on)c.classList.add('sel');
        c.onclick=()=>{
          if(f.type==='multi'){let arr=Array.isArray(formVals[f.id])?formVals[f.id].slice():[];
            const i=arr.indexOf(opt);if(i>=0)arr.splice(i,1);else arr.push(opt);formVals[f.id]=arr;}
          else{formVals[f.id]=(formVals[f.id]===opt)?null:opt;}
          buildForm();
        };
        chips.appendChild(c);
      });
      wrap.appendChild(chips);
    }else if(f.type==='toggle'){
      const chips=document.createElement('div');chips.className='chips';
      [['是',true],['否',false]].forEach(([t,val])=>{
        const c=document.createElement('div');c.className='chip'+(cur===val?' sel':'');c.textContent=t;
        c.onclick=()=>{formVals[f.id]=(formVals[f.id]===val)?null:val;buildForm();};
        chips.appendChild(c);
      });
      wrap.appendChild(chips);
    }else if(f.type==='rating'){
      const st=document.createElement('div');st.className='stars';
      for(let i=1;i<=5;i++){const s=document.createElement('span');s.className='st'+(cur>=i?' on':'');s.textContent='★';
        s.onclick=()=>{formVals[f.id]=(formVals[f.id]===i)?null:i;buildForm();};st.appendChild(s);}
      wrap.appendChild(st);
    }else if(f.type==='number'){
      const inp=document.createElement('input');inp.type='number';inp.inputMode='numeric';inp.value=cur!=null?cur:'';
      inp.oninput=()=>{formVals[f.id]=inp.value===''?null:Number(inp.value);};
      wrap.appendChild(inp);
    }else{
      const ta=document.createElement('textarea');ta.value=cur||'';
      ta.oninput=()=>{formVals[f.id]=ta.value;};
      wrap.appendChild(ta);
    }
    box.appendChild(wrap);
  });
}
function openAdd(dateStr){
  editingEntry=null;formVals={};formColor='#6c63ff';
  const now=new Date();
  document.getElementById('entryTitle').textContent='添加记录';
  document.getElementById('eDelete').style.display='none';
  document.getElementById('eDate').value=dateStr||fmtDate(now);
  document.getElementById('eTime').value=pad(now.getHours())+':'+pad(now.getMinutes());
  buildColorPick();buildForm();hideMask('dayMask');showMask('entryMask');
}
function openEntry(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  editingEntry=id;formVals=JSON.parse(JSON.stringify(e.values||{}));formColor=e.color||'#6c63ff';
  document.getElementById('entryTitle').textContent='编辑记录';
  document.getElementById('eDelete').style.display='block';
  document.getElementById('eDate').value=e.date;document.getElementById('eTime').value=e.time||'';
  buildColorPick();buildForm();hideMask('dayMask');showMask('entryMask');
}
function saveEntry(){
  const date=document.getElementById('eDate').value;if(!date){toast('请选择日期');return;}
  const time=document.getElementById('eTime').value;
  const vals={};Object.keys(formVals).forEach(k=>{const v=formVals[k];
    if(v==null||v===''||(Array.isArray(v)&&!v.length))return;vals[k]=v;});
  if(editingEntry){const e=state.entries.find(x=>x.id===editingEntry);e.date=date;e.time=time;e.values=vals;e.color=formColor;}
  else state.entries.push({id:uid('e'),date,time,values:vals,color:formColor});
  save();hideMask('entryMask');render();toast('已保存');
}
function deleteEntry(){if(!editingEntry)return;state.entries=state.entries.filter(x=>x.id!==editingEntry);
  save();hideMask('entryMask');render();toast('已删除');}

/* ---------- 某天 ---------- */
let dayDate=null;
function openDay(ds){
  dayDate=ds;document.getElementById('dayTitle').textContent=fmtNice(ds);
  const es=entriesOn(ds);const box=document.getElementById('dayList');
  if(!es.length)box.innerHTML='<div class="empty">这天还没有记录</div>';
  else box.innerHTML=es.map(entryCard).join('');
  box.querySelectorAll('.entry').forEach(el=>el.onclick=()=>openEntry(el.dataset.id));
  showMask('dayMask');
}

/* ---------- 设置 ---------- */
function openSettings(){document.getElementById('sName').value=state.settings.name||'';showMask('setMask');}
function applySettings(){state.settings.name=document.getElementById('sName').value.trim()||'我的记录';
  document.getElementById('appTitle').textContent=state.settings.name;save();}

/* ---------- 字段管理 ---------- */
function renderFieldList(){
  const box=document.getElementById('fieldList');box.innerHTML='';
  state.fields.forEach((f,i)=>{
    const el=document.createElement('div');el.className='fld-item';
    el.innerHTML='<div class="fn"><div class="nm">'+esc(f.name)+'</div><div class="tp">'+TYPE_LABEL[f.type]+
      (f.options&&f.options.length?' · '+f.options.length+' 项':'')+'</div></div>';
    const up=mini('↑',()=>{if(i>0){[state.fields[i-1],state.fields[i]]=[state.fields[i],state.fields[i-1]];save();renderFieldList();}});
    const dn=mini('↓',()=>{if(i<state.fields.length-1){[state.fields[i+1],state.fields[i]]=[state.fields[i],state.fields[i+1]];save();renderFieldList();}});
    const ed=mini('✎',()=>openFieldEdit(f.id));
    el.appendChild(up);el.appendChild(dn);el.appendChild(ed);
    box.appendChild(el);
  });
}
function mini(t,fn){const b=document.createElement('button');b.className='mini';b.textContent=t;b.onclick=fn;return b;}

let editingField=null, fldOptions=[];
function renderOpts(){
  const box=document.getElementById('optList');box.innerHTML='';
  fldOptions.forEach((o,i)=>{
    const row=document.createElement('div');row.className='opt-row';
    const inp=document.createElement('input');inp.value=o;inp.placeholder='选项'+(i+1);
    inp.oninput=()=>fldOptions[i]=inp.value;
    const del=document.createElement('button');del.textContent='×';del.onclick=()=>{fldOptions.splice(i,1);renderOpts();};
    row.appendChild(inp);row.appendChild(del);box.appendChild(row);
  });
}
function syncOptWrap(){const t=document.getElementById('flType').value;
  document.getElementById('optWrap').style.display=(t==='single'||t==='multi')?'block':'none';}
function openFieldAdd(){
  editingField=null;fldOptions=[''];
  document.getElementById('fldEditTitle').textContent='添加字段';
  document.getElementById('flDelete').style.display='none';
  document.getElementById('flName').value='';document.getElementById('flType').value='single';
  syncOptWrap();renderOpts();showMask('fldEditMask');
}
function openFieldEdit(id){
  const f=state.fields.find(x=>x.id===id);if(!f)return;
  editingField=id;fldOptions=(f.options||[]).slice();if(!fldOptions.length)fldOptions=[''];
  document.getElementById('fldEditTitle').textContent='编辑字段';
  document.getElementById('flDelete').style.display='block';
  document.getElementById('flName').value=f.name;document.getElementById('flType').value=f.type;
  syncOptWrap();renderOpts();showMask('fldEditMask');
}
function saveField(){
  const name=document.getElementById('flName').value.trim();if(!name){toast('请输入字段名称');return;}
  const type=document.getElementById('flType').value;
  let opts=[];
  if(type==='single'||type==='multi'){opts=fldOptions.map(s=>s.trim()).filter(Boolean);
    if(!opts.length){toast('请至少添加一个选项');return;}}
  if(editingField){const f=state.fields.find(x=>x.id===editingField);f.name=name;f.type=type;f.options=opts;}
  else state.fields.push({id:uid('f'),name,type,options:opts});
  save();hideMask('fldEditMask');renderFieldList();toast('已保存');
}
function deleteField(){
  if(!editingField)return;
  if(!confirm('删除该字段？已记录的此字段内容也会一并消失。'))return;
  state.fields=state.fields.filter(x=>x.id!==editingField);
  state.entries.forEach(e=>{delete e.values[editingField];});
  save();hideMask('fldEditMask');renderFieldList();render();toast('已删除字段');
}

/* ---------- 统计定制 ---------- */
function statFieldOptions(){return state.fields.filter(f=>f.type==='single'||f.type==='multi'||f.type==='toggle');}
function avgFieldOptions(){return state.fields.filter(f=>f.type==='rating'||f.type==='number');}
function renderStatList(){
  const box=document.getElementById('statList');box.innerHTML='';
  if(!state.statWidgets.length){box.innerHTML='<div class="empty">还没有统计项</div>';return;}
  state.statWidgets.forEach((w,i)=>{
    const f=state.fields.find(x=>x.id===w.fieldId);
    const valLabel=w.value==='__true__'?'是':w.value==='__false__'?'否':w.value;
    const m=w.metric==='count'?'记录数':w.metric==='avg'?('平均 '+(f?esc(f.name):'?')):((f?esc(f.name):'?')+' = '+esc(valLabel));
    const tp=(w.form==='trend'?'趋势·近'+(w.months||6)+'月·':'小框·')+m;
    const el=document.createElement('div');el.className='fld-item';
    el.innerHTML='<div class="fn"><div class="nm">'+esc(w.name)+'</div><div class="tp">'+tp+'</div></div>';
    el.appendChild(mini('↑',()=>{if(i>0){[state.statWidgets[i-1],state.statWidgets[i]]=[state.statWidgets[i],state.statWidgets[i-1]];save();renderStatList();}}));
    el.appendChild(mini('↓',()=>{if(i<state.statWidgets.length-1){[state.statWidgets[i+1],state.statWidgets[i]]=[state.statWidgets[i],state.statWidgets[i+1]];save();renderStatList();}}));
    el.appendChild(mini('✎',()=>openStatEdit(w.id)));
    box.appendChild(el);
  });
}
let editingStat=null;
function fillSel(sel,opts){sel.innerHTML='';opts.forEach(o=>{const e=document.createElement('option');e.value=o.v;e.textContent=o.t;sel.appendChild(e);});}
function fillStatValue(){
  const f=state.fields.find(x=>x.id===document.getElementById('stField').value);
  const sel=document.getElementById('stValue');sel.innerHTML='';if(!f)return;
  if(f.type==='toggle'){sel.innerHTML='<option value="__true__">是</option><option value="__false__">否</option>';}
  else (f.options||[]).forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;sel.appendChild(op);});
}
function syncStatForm(){
  const metric=document.getElementById('stMetric').value;
  const form=document.getElementById('stForm').value;
  document.getElementById('stFieldRow').style.display=(metric==='value')?'block':'none';
  document.getElementById('stValueRow').style.display=(metric==='value')?'block':'none';
  document.getElementById('stAvgRow').style.display=(metric==='avg')?'block':'none';
  document.getElementById('stMonthsRow').style.display=(form==='trend')?'block':'none';
}
function openStatAdd(){
  editingStat=null;document.getElementById('statEditTitle').textContent='添加统计项';
  document.getElementById('stDelete').style.display='none';document.getElementById('stName').value='';
  document.getElementById('stForm').value='card';document.getElementById('stMetric').value='count';document.getElementById('stMonths').value='6';
  fillSel(document.getElementById('stField'),statFieldOptions().map(f=>({v:f.id,t:f.name})));
  fillSel(document.getElementById('stAvg'),avgFieldOptions().map(f=>({v:f.id,t:f.name})));
  fillStatValue();syncStatForm();showMask('statEditMask');
}
function openStatEdit(id){
  const w=state.statWidgets.find(x=>x.id===id);if(!w)return;editingStat=id;
  document.getElementById('statEditTitle').textContent='编辑统计项';
  document.getElementById('stDelete').style.display='block';document.getElementById('stName').value=w.name;
  document.getElementById('stForm').value=w.form||'card';document.getElementById('stMetric').value=w.metric||'count';document.getElementById('stMonths').value=String(w.months||6);
  fillSel(document.getElementById('stField'),statFieldOptions().map(f=>({v:f.id,t:f.name})));
  fillSel(document.getElementById('stAvg'),avgFieldOptions().map(f=>({v:f.id,t:f.name})));
  if(w.metric==='value'&&w.fieldId)document.getElementById('stField').value=w.fieldId;
  fillStatValue();if(w.value)document.getElementById('stValue').value=w.value;
  if(w.metric==='avg'&&w.fieldId)document.getElementById('stAvg').value=w.fieldId;
  syncStatForm();showMask('statEditMask');
}
function saveStat(){
  const name=document.getElementById('stName').value.trim();if(!name){toast('请输入名称');return;}
  const form=document.getElementById('stForm').value;const metric=document.getElementById('stMetric').value;
  const data={name,form,metric,months:+document.getElementById('stMonths').value};
  if(metric==='value'){data.fieldId=document.getElementById('stField').value;data.value=document.getElementById('stValue').value;
    if(!data.fieldId||!data.value){toast('请选择字段和值');return;}}
  else if(metric==='avg'){data.fieldId=document.getElementById('stAvg').value;if(!data.fieldId){toast('请选择字段');return;}}
  if(editingStat){const w=state.statWidgets.find(x=>x.id===editingStat);Object.keys(w).forEach(k=>{if(k!=='id')delete w[k];});Object.assign(w,data);}
  else state.statWidgets.push(Object.assign({id:uid('s')},data));
  save();hideMask('statEditMask');renderStatList();toast('已保存');
}
function deleteStat(){if(!editingStat)return;state.statWidgets=state.statWidgets.filter(x=>x.id!==editingStat);
  save();hideMask('statEditMask');renderStatList();toast('已删除');}

/* ---------- 备份 ---------- */
function exportData(){
  const json=JSON.stringify(state,null,2);
  const name='记录备份_'+fmtDate(new Date())+'.json';
  if(window.AndroidBridge&&AndroidBridge.saveBackup){try{AndroidBridge.saveBackup(name,json);toast('已导出备份');return;}catch(e){}}
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);toast('已导出备份');
}
function importData(file){const r=new FileReader();
  r.onload=()=>{try{const s=JSON.parse(r.result);if(!s.fields||!s.entries)throw 0;
    state=s;if(!state.statWidgets)state.statWidgets=[];save();document.getElementById('appTitle').textContent=state.settings.name||'我的记录';
    render();hideMask('setMask');toast('已导入数据');}catch(e){toast('文件格式不正确');}};
  r.readAsText(file);}

let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1700);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
if(state.entries.length===0)setTimeout(()=>toast('点右下角 ＋ 添加第一条记录'),500);
</script>
